<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
  <!-- CHIVORA — full lockup, transparent background -->

  <!-- ICON: two arcing strokes forming a 'C' around a central node — data flowing into place -->
  <g transform="translate(20, 20)">
    <!-- outer arc -->
    <path d="M 108 6
             A 64 64 0 1 0 108 134"
          fill="none" stroke="#0A0A0A" stroke-width="12" stroke-linecap="round"/>
    <!-- inner arc, blue, slightly offset to suggest motion/depth -->
    <path d="M 100 26
             A 44 44 0 1 0 100 114"
          fill="none" stroke="#2563EB" stroke-width="12" stroke-linecap="round"/>
    <!-- central node the arcs resolve into -->
    <circle cx="100" cy="70" r="9" fill="#2563EB"/>
    <circle cx="100" cy="70" r="16" fill="none" stroke="#2563EB" stroke-width="2" opacity="0.3"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(190, 0)">
    <text x="0" y="103" font-family="'Space Grotesk', 'Arial Black', sans-serif"
          font-size="64" font-weight="700" letter-spacing="-1.5" fill="#0A0A0A">Chivora</text>
    <!-- signature blue square dot -->
    <rect x="345" y="60" width="14" height="14" rx="2" fill="#2563EB"/>
  </g>
</svg>
